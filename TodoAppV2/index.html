<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="popups.css">
        <title>Todo-AppV2</title>
    </head>
    <body>
        <main class="app">
            <aside class="sidebar">
                <div class="sidebar-content">
                    <header class="sidebar-header">
                        <div class="sidebar-title-row">
                            <h2 class="app-name">TodoApp</h2>
                            <button class="sidebar-close-btn">×</button>
                        </div>
                        <img src="/Img/Logo.png"class="logo">
                    </header>
                    <section class="sidebar-nav">
                        <button class="sidebar-nav-btn tasks-nav-btn">
                            <span class="sidebar-nav-btn-icon">
                                <img src="/Img/task.png" class="sidebar-nav-btn-icon-default">
                                <img src="/Img/taskFill.png" class="sidebar-nav-btn-icon-active">
                            </span>
                            <span>Tasks</span>
                        </button>
                        <button class="sidebar-nav-btn categories-nav-btn">
                            <span class="sidebar-nav-btn-icon">
                                <img src="/Img/folder.svg" class="sidebar-nav-btn-icon-default">
                                <img src="/Img/folderFill.svg" class="sidebar-nav-btn-icon-active">
                            </span>
                            <span>Categories</span>
                        </button>
                        <div class="categories-container">
                            <ul class="categories-list">
                                <li class="add-new-categories-li">
                                    <img src="/Img/add.svg">
                                    <span class="category-name">Add New</span>
                                </li>
                                <!-- <li class="category-item"><div class="category-color"></div><span class="category-name">Undifined</span></li> -->
                            </ul>
                        </div>
                    </section>
                </div>
            </aside>
            <section class="main-content">
                <div class="main-content-inner">
                    <header class="main-content-header">
                        <button class="sidebar-open-btn"></button>
                        <h1 class="header-text">All your tasks</h1>
                    </header>
                    <div class="tasks-container">
                        <div class="task-filter-container">
                            <p>Tasks</p>
                            <button class="task-filter-btn all-btn" data-filter="all">All</button>
                            <button class="task-filter-btn done-btn" data-filter="done">Done</button>
                            <button class="task-filter-btn not-done-btn" data-filter="not-done">Not Done</button>
                        </div>
                        <button class="add-task-btn"><img src="/Img/add.svg" alt=""></button>
                        <div class="tasks-list-container">
                            <ul class="task-list">
                            </ul>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <main class="popup create-category-popup">
            <section class="popup-card">
                <p>Insert category name</p>
                <input class="category-name-input" type="text" placeholder="For example Work">
                <p>Insert category color</p>
                <input class="category-color-input" type="color">
                <div class="popup-nav">
                    <button class="popup-nav-btn popup-nav-cancel">Cancel</button>
                    <button class="popup-nav-btn popup-nav-create">Create</button>
                </div>
            </section>
        </main>        
        <main class="popup edit-category-popup">
            <section class="popup-card">
                <p>Edit category name</p>
                <input class="category-name-input" type="text" placeholder="For example Work">
                <p>Edit category color</p>
                <input class="category-color-input" type="color">
                <div class="popup-nav">
                    <button class="popup-nav-btn popup-nav-delete">Delete</button>
                    <button class="popup-nav-btn popup-nav-save">Save</button>
                </div>
            </section>
        </main>        
        <main class="popup add-task-popup">
            <section class="popup-card">
                <p>Insert name</p>
                <input class="task-title-input" type="text" placeholder="Task name">
                <p>Select a category</p>
                <div class="task-category-dropdown">
                    <button class="task-category-btn">
                        <span class="task-category-name">none</span>
                        <img src="/Img/arrow.svg">
                    </button>
                    <ul class="task-category-list">
                    </ul>
                </div>
                <div class="popup-nav">
                    <button class="popup-nav-btn popup-nav-cancel">Cancel</button>
                    <button class="popup-nav-btn popup-nav-create popup-nav-add">Add</button>
                </div>
            </section>
        </main>        
        <main class="popup edit-task-popup">
            <section class="popup-card">
                <p>Insert name</p>
                <input class="task-title-input" type="text" placeholder="Task name">
                <p>Select a category</p>
                <div class="task-category-dropdown">
                    <button class="task-category-btn">
                        <span class="task-category-name">none</span>
                        <img src="/Img/arrow.svg">
                    </button>
                    <ul class="task-category-list">
                    </ul>
                </div>
                <div class="popup-nav">
                    <button class="popup-nav-btn popup-nav-cancel">Cancel</button>
                    <button class="popup-nav-btn popup-nav-save">Save</button>
                </div>
            </section>
        </main>        
        <script type="module" src="app.js"></script>
    </body>
</html>
