<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <title>Todo-App</title>
    </head>
    <body>
        <main class="app">
            <aside class="side-panel">
                <div class="side-panel-inner">
                    <button class="sidebar-btn"><img src="/Img/sidebar.png" ></button>
                    <img src="/Img/Logo.png" class="logo">
                    <div class="side-panel-btns">
                        <button class="side-panel-btn task-btn">
                            <span class="btn-icon">
                                <img class="btn-icon-default" src="/Img/task.png">
                                <img class="btn-icon-active" src="/Img/taskFill.png">
                            </span>
                            <span>Tasks</span>
                        </button>
                        <button class="side-panel-btn categories-btn">
                            <span class="btn-icon">
                                <img class="btn-icon-default" src="/Img/folder.svg">
                                <img class="btn-icon-active" src="/Img/folderFill.svg">
                            </span>
                            <span>Categories</span>
                        </button> 
                        <div class="categories">
                            <ul class="categories-inner">
                                <li class="add-category"><img src="/Img/add.svg"><span>Add new</span></li>
                            </ul>
                        </div>
                    </div>
                </div>              
            </aside>

            <section class="content">
                <h2>Hello Task</h2>
            </section>
        </main>

        <main class="popup add-category-popup">
            <section class="popup-card">
                <p>Insert category name</p>
                <input class="new-category-name" type="text" placeholder="For example Work">
                <p>Insert category color</p>
                <input class="new-category-color" type="color">
                <div class="popup-nav">
                    <button class="popup-btn cancel">Cancel</button>
                    <button class="popup-btn add">Add</button>
                </div>
            </section>
        </main>
        <main class="popup edit-category-popup">
            <section class="popup-card">
                <p>Edit category name</p>
                <input class="new-category-name" type="text" placeholder="For example Work">
                <p>Edit category color</p>
                <input class="new-category-color" type="color">
                <div class="popup-nav">
                    <button class="popup-btn cancel">Cancel</button>
                    <button class="popup-btn delete">Delete</button>
                </div>
            </section>
        </main>

        <script type="module" src="app.js"></script>
    </body>
</html>
